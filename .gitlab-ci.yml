stages:
  - deploy

default:
  image: debian:stable-slim

variables:
  GIT_SUBMODULE_STRATEGY: "recursive"
  ZOLA_VERSION:
    description: "The version of Zola used to build the site."
    value: "0.22.1"

pages:
  stage: deploy
  script:
    - |
      apt-get update
      DEBIAN_FRONTEND=noninteractive apt-get install --assume-yes --no-install-recommends wget ca-certificates nodejs npm
      zola_url="https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
      if ! wget --quiet --spider $zola_url; then
        echo "A Zola release with the specified version could not be found."
        exit 1
      fi
      wget $zola_url
      tar -xzf *.tar.gz
      npm install
      npx tsc
      ./zola build
      #./zola build --base-url $CI_PAGES_URL

  artifacts:
    paths:
       - public

  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
