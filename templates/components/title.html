{% macro new(title, subtitle, subsubtitle, flavor_id) %}
<div id="title">
  <span>
    {% if title %}
    <a href="{{ config.base_url }}" id="title-text">
      {{ title }}<span id="title-cursor">&block;</span>
    </a>
    {% endif %}

    {% if subtitle %}
    <br/>
    <span id="subtitle">{{ subtitle }}</span>
    {% endif %}

    <br/>
    <p {% if flavor_id %}id="{{ flavor_id }}"{% endif %} class="flavor-text">
      {% if subsubtitle %}{{ subsubtitle }}{% else %}<span style="color: transparent;">secret text :)</span>{% endif %}
    </p>
  </span>
</div>
{% endmacro new %}
